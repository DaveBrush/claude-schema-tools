<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXIF Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2318181b'/><text x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-family='monospace' font-size='13' font-weight='700' fill='%23e879a8'>img</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--bg2:#12151e;--bg3:#181c28;--bg4:#1f2436;--bg5:#252b40;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#dde1f0;--text2:#7c829a;--text3:#454b62;
  --accent:#e879a8;
  --green:#3dd68c;--amber:#f5a623;--coral:#f0645a;--teal:#22d3c8;--purple:#9b7ff4;--pink:#e879a8;
  --shadow:rgba(0,0,0,0.5);
  --mono:'JetBrains Mono','Fira Code',monospace;--sans:'Outfit',system-ui,sans-serif;
}
html.light{
  --bg:#f0f2f7;--bg2:#ffffff;--bg3:#e8eaf2;--bg4:#dde0ec;--bg5:#cdd1e0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.2);
  --text:#1a1d2e;--text2:#4a5068;--text3:#8890aa;
  --shadow:rgba(0,0,0,0.15);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;position:relative;z-index:100}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.04em;white-space:nowrap}
.logo em{color:var(--text3);font-style:normal}
.divider{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.hdr-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.theme-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;font-size:15px;line-height:1}
button{cursor:pointer;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);color:var(--text2);font-family:var(--sans);font-size:12px;padding:6px 12px;transition:background .15s,transform .1s;white-space:nowrap}
button:hover{background:var(--bg4);color:var(--text)}
button:active{transform:scale(0.96)}
.btn-p{background:rgba(232,121,168,.15);border-color:rgba(232,121,168,.3);color:var(--accent);font-weight:500}
.btn-p:hover{background:rgba(232,121,168,.25);color:var(--accent)}
input[type=file]{display:none}
.content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg5) transparent}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
.inner{max-width:860px;margin:0 auto;padding:24px 20px 48px}
/* DROP ZONE */
.drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3);padding:60px 40px;text-align:center;cursor:pointer}
.drop-ring{width:72px;height:72px;border:2px dashed var(--border3);border-radius:18px;display:flex;align-items:center;justify-content:center;transition:border-color .18s,background .18s}
.drop:hover .drop-ring,.drop.drag-over .drop-ring{border-color:var(--accent);background:rgba(232,121,168,.06)}
.drop h2{font-size:17px;font-weight:500;color:var(--text2)}
.drop p{font-size:12px;line-height:1.7;max-width:300px}
.drop-hint{font-size:11px;color:var(--text3);font-family:var(--mono);background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 12px}
/* LOADING */
#loading{display:none;text-align:center;padding:48px;color:var(--text2)}
#loading p{font-size:13px}
.prog{height:2px;background:var(--accent);margin:12px auto 0;border-radius:1px;animation:prog 1.2s ease-in-out infinite}
@keyframes prog{0%{width:0;opacity:.5}50%{width:220px;opacity:1}100%{width:0;opacity:.5}}
/* IMAGE PREVIEW */
.img-preview{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.img-preview img{max-width:100%;max-height:380px;display:block;margin:0 auto}
.img-caption{font-size:11px;color:var(--text3);font-family:var(--mono);padding:7px 14px;background:var(--bg3);border-top:1px solid var(--border)}
/* SECTIONS */
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.sec-hdr{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;gap:8px;transition:background .1s}
.sec-hdr:hover{background:var(--bg3)}
.sec.collapsed>.sec-hdr{border-bottom-color:transparent}
.sec-title{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);flex:1}
.sec-tog{color:var(--text3);font-size:10px;transition:transform .18s;flex-shrink:0}
.sec.collapsed>.sec-hdr>.sec-tog{transform:rotate(-90deg)}
.sec.collapsed>.sec-body{display:none}
/* BADGES */
.bdg{font-size:10px;font-weight:600;font-family:var(--mono);padding:1px 6px;border-radius:4px}
.b-ok{background:rgba(61,214,140,.12);color:var(--green)}
.b-warn{background:rgba(245,166,35,.12);color:var(--amber)}
.b-neutral{background:var(--bg4);border:1px solid var(--border2);color:var(--text3)}
/* TABLE */
.meta-table{width:100%;border-collapse:collapse}
.meta-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
html.light .meta-table tr:nth-child(even) td{background:rgba(0,0,0,0.03)}
.meta-table td{padding:5px 14px;border-bottom:1px solid var(--border);vertical-align:top;font-size:12px}
.meta-table td:first-child{color:var(--text3);font-family:var(--mono);font-size:11px;white-space:nowrap;width:38%;padding-right:8px}
.meta-table td:last-child{color:var(--text);word-break:break-all}
.meta-table tr:last-child td{border-bottom:none}
/* INFO BOXES */
.box{margin:10px 14px 12px;padding:9px 12px;border-radius:6px;font-size:12px;border-left:3px solid;line-height:1.6}
.box-ok{background:rgba(61,214,140,.07);border-color:var(--green);color:var(--text2)}
.box-warn{background:rgba(245,166,35,.07);border-color:var(--amber);color:var(--text2)}
.box-neutral{background:var(--bg3);border-color:var(--border2);color:var(--text2)}
/* MISC */
.clip-name{font-family:var(--mono);font-weight:600;color:var(--green)}
.clip-active{font-family:var(--mono);font-weight:600;color:var(--accent)}
a.map-link{color:var(--teal);text-decoration:none}
a.map-link:hover{text-decoration:underline}
/* RELOAD STRIP */
.drop-small{position:relative;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:background .1s}
.drop-small:hover{background:var(--bg3)}
.drop-small span{font-size:12px;color:var(--text2);font-family:var(--mono)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">exif<em>/</em>viewer</div>
    <div class="divider"></div>
    <div class="hdr-sub">EXIF · IPTC · XMP · GPS · ICC · Clipping Paths</div>
    <div class="hdr-r">
      <button class="theme-btn" id="themebtn" title="Toggle light/dark mode">🌙</button>
      <button class="btn-p" onclick="document.getElementById('file-input').click()">↑ Load image</button>
      <input type="file" id="file-input" accept="image/*,.tiff,.tif,.heic,.heif,.avif,.webp,.png,.jpg,.jpeg,.gif,.bmp,.cr2,.nef,.arw,.orf,.rw2,.dng,.psd,.eps">
    </div>
  </div>
  <div class="content">
    <div class="inner">
      <div id="drop-zone" class="drop">
        <div class="drop-ring">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <h2>Drop an image here</h2>
        <p>or click to select a file</p>
        <div class="drop-hint">JPEG · TIFF · PNG · HEIC · WebP · PSD · RAW (CR2, NEF, ARW, DNG…)</div>
      </div>
      <div id="loading"><p>Parsing image metadata…</p><div class="prog"></div></div>
      <div id="output"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/utif@2.0.1/UTIF.js"></script>
<script>
// ── Photoshop 8BIM clipping path parser ──────────────────────────────────────
function parse8BIM(buffer) {
  const view = new DataView(buffer);
  const u8 = new Uint8Array(buffer);
  const paths = [];
  let clipPathName = null;
  let i = 0;
  function readUint16(pos) { return view.getUint16(pos, false); }
  function readUint32(pos) { return view.getUint32(pos, false); }
  while (i + 12 <= u8.length) {
    if (u8[i]===0x38 && u8[i+1]===0x42 && u8[i+2]===0x49 && u8[i+3]===0x4D) {
      const resId = readUint16(i + 4);
      const nameLen = u8[i + 6];
      const pascalTotal = nameLen === 0 ? 2 : (1 + nameLen) + ((1 + nameLen) % 2);
      const dataLenOffset = i + 6 + pascalTotal;
      if (dataLenOffset + 4 > u8.length) break;
      const dataLen = readUint32(dataLenOffset);
      const dataStart = dataLenOffset + 4;
      const dataEnd = dataStart + dataLen;
      const blockEnd = dataEnd + (dataLen % 2);
      if (resId === 0x0BB7) {
        if (dataLen >= 4) {
          const charCount = readUint32(dataStart);
          let name = '';
          for (let c = 0; c < charCount && dataStart + 4 + c*2 + 1 < dataEnd; c++) {
            name += String.fromCharCode(readUint16(dataStart + 4 + c * 2));
          }
          clipPathName = name || null;
        }
      }
      if (resId >= 0x07D0 && resId <= 0x0BB6) {
        let pathResName = '';
        if (nameLen > 0) {
          for (let b = 0; b < nameLen; b++) pathResName += String.fromCharCode(u8[i + 7 + b]);
        }
        const records = [];
        for (let p = dataStart; p + 26 <= dataEnd; p += 26) {
          records.push({ selector: readUint16(p) });
        }
        paths.push({ id: resId, index: resId - 0x07D0, resourceName: pathResName, recordCount: records.length, records });
      }
      i = blockEnd;
    } else { i++; }
  }
  return { paths, clipPathName };
}

function extractApp13(buffer) {
  const u8 = new Uint8Array(buffer);
  if (u8[0] !== 0xFF || u8[1] !== 0xD8) return null;
  const segments = [];
  let i = 2;
  while (i + 4 < u8.length) {
    if (u8[i] !== 0xFF) { i++; continue; }
    const marker = u8[i + 1];
    if (marker === 0xED) {
      const segLen = (u8[i+2] << 8) | u8[i+3];
      segments.push(buffer.slice(i + 4, i + 2 + segLen));
    }
    if (marker === 0xD9 || marker === 0xDA) break;
    const segLen2 = (u8[i+2] << 8) | u8[i+3];
    i += 2 + segLen2;
  }
  if (!segments.length) return null;
  const parts = segments.map(s => {
    const u = new Uint8Array(s);
    if (String.fromCharCode(...u.slice(0, 14)).startsWith('Photoshop 3.0')) return s.slice(14);
    return s;
  });
  const total = parts.reduce((a, b) => a + b.byteLength, 0);
  const merged = new Uint8Array(total);
  let off = 0;
  for (const p of parts) { merged.set(new Uint8Array(p), off); off += p.byteLength; }
  return merged.buffer;
}

function extractTiffPhotoshop(buffer) {
  const u8 = new Uint8Array(buffer);
  for (let i = 0; i < u8.length - 4; i++) {
    if (u8[i]===0x38 && u8[i+1]===0x42 && u8[i+2]===0x49 && u8[i+3]===0x4D) return buffer.slice(i);
  }
  return null;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtBytes(b) {
  if (b < 1024) return b + ' bytes';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}
function fmtDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v.toLocaleString('en-GB', { dateStyle: 'long', timeStyle: 'medium' });
  const s = String(v);
  const m = s.match(/^(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
  if (m) return new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+m[6]).toLocaleString('en-GB',{dateStyle:'long',timeStyle:'medium'});
  return s;
}
function nlToBr(s) {
  // handles real newlines and XML character entities (&#xA; &#xD; &#10; &#13;)
  return s.replace(/&#x[Dd];&#x[Aa];|&#x[Aa];|&#x[Dd];|&#13;&#10;|&#10;|&#13;|\r\n|\r|\n/g, '<br>');
}
function fmtVal(v) {
  if (v===undefined||v===null) return '<em style="color:var(--text3)">—</em>';
  if (v instanceof Date) return fmtDate(v);
  if (v instanceof Uint8Array || ArrayBuffer.isView(v)) return `<span style="color:var(--text3)">[Binary, ${v.byteLength||v.length} bytes]</span>`;
  if (Array.isArray(v)) return v.length > 20 ? v.slice(0,20).join(', ')+` … (+${v.length-20} more)` : v.join(', ');
  if (typeof v==='object') {
    const entries = Object.entries(v);
    if (entries.length && entries.every(([,x]) => x === null || typeof x !== 'object'))
      return entries.map(([k,x]) =>
        `<span style="display:block"><span style="color:var(--text3);font-family:var(--mono);font-size:10px">${k}</span>: ${x===null?'<em style="color:var(--text3)">null</em>':nlToBr(String(x))}</span>`
      ).join('');
    try { return JSON.stringify(v); } catch { return '[Object]'; }
  }
  return nlToBr(String(v));
}
function makeTable(rows) {
  if (!rows.length) return '<p style="padding:14px;color:var(--text3);font-size:12px;text-align:center;font-style:italic">No data in this group</p>';
  return `<table class="meta-table">${rows.map(([k,v])=>`<tr><td>${k}</td><td>${fmtVal(v)}</td></tr>`).join('')}</table>`;
}
function makeSection(title, rows, badge) {
  const id = 'sec_'+Math.random().toString(36).slice(2);
  const badgeHtml = badge ? `<span class="bdg b-ok">${badge}</span>` : '';
  return `<div class="sec" id="${id}">
    <div class="sec-hdr" onclick="toggleSection('${id}')">
      <span class="sec-title">${title}</span>${badgeHtml}<span class="sec-tog">▼</span>
    </div>
    <div class="sec-body">${makeTable(rows)}</div>
  </div>`;
}
window.toggleSection = function(id) {
  document.getElementById(id).classList.toggle('collapsed');
};
function dms(deg, ref) {
  const d = Math.floor(Math.abs(deg)), mAll = (Math.abs(deg)-d)*60;
  const m = Math.floor(mAll), s = ((mAll-m)*60).toFixed(2);
  return `${d}° ${m}' ${s}" ${ref}`;
}
const PATH_SELECTOR = {0:'Closed subpath length record',1:'Closed subpath Bezier knot (linked)',2:'Closed subpath Bezier knot (unlinked)',3:'Open subpath length record',4:'Open subpath Bezier knot (linked)',5:'Open subpath Bezier knot (unlinked)',6:'Path fill rule record',7:'Clipboard record',8:'Initial fill rule record'};

// ── Main ──────────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const output = document.getElementById('output');
const loading = document.getElementById('loading');

// Theme
const THEME_KEY = 'schema-explorer-theme';
const themebtn = document.getElementById('themebtn');
if (localStorage.getItem(THEME_KEY) === 'light') { document.documentElement.classList.add('light'); themebtn.textContent = '☀️'; }
themebtn.addEventListener('click', () => {
  const light = document.documentElement.classList.toggle('light');
  localStorage.setItem(THEME_KEY, light ? 'light' : 'dark');
  themebtn.textContent = light ? '☀️' : '🌙';
});

// Drop zone
dropZone.onclick = () => { fileInput.value = ''; fileInput.click(); };
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) processFile(f); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

async function processFile(file) {
  loading.style.display = 'block'; output.innerHTML = ''; dropZone.style.display = 'none';
  let url = URL.createObjectURL(file);
  let exifData = null, imgW = 0, imgH = 0;
  try {
    exifData = await exifr.parse(file, {tiff:true,exif:true,gps:true,iptc:true,xmp:true,icc:true,jfif:true,ihdr:true,makerNote:true,multiSegment:true,mergeOutput:false,translateValues:true,reviveValues:true,sanitize:true});
  } catch(e) { try { exifData = await exifr.parse(file); } catch {} }
  // Try native browser image load
  await new Promise(res => { const img = new Image(); img.onload = () => { imgW = img.naturalWidth; imgH = img.naturalHeight; res(); }; img.onerror = res; img.src = url; });
  // Read buffer once — used for both TIFF decode and 8BIM parsing
  let buf = null;
  try { buf = await file.arrayBuffer(); } catch(e) {}
  // If native load failed (e.g. TIFF in Chrome/Firefox), decode with UTIF
  if (imgW === 0 && buf && typeof UTIF !== 'undefined') {
    try {
      const ifds = UTIF.decode(buf);
      if (ifds.length > 0) {
        UTIF.decodeImages(buf, ifds);
        const rgba = UTIF.toRGBA8(ifds[0]);
        imgW = ifds[0].width;
        imgH = ifds[0].height;
        const canvas = document.createElement('canvas');
        canvas.width = imgW; canvas.height = imgH;
        const ctx = canvas.getContext('2d');
        const id = ctx.createImageData(imgW, imgH);
        id.data.set(rgba);
        ctx.putImageData(id, 0, 0);
        URL.revokeObjectURL(url);
        url = await new Promise(res => canvas.toBlob(b => res(URL.createObjectURL(b)), 'image/png'));
      }
    } catch(e) { console.warn('UTIF decode failed', e); }
  }
  let clipInfo = null;
  try {
    if (buf) {
      const ext = file.name.split('.').pop().toLowerCase();
      const bimBuf = ['jpg','jpeg'].includes(ext) ? extractApp13(buf) : extractTiffPhotoshop(buf);
      if (bimBuf) clipInfo = parse8BIM(bimBuf);
    }
  } catch(e) { console.warn('8BIM parse error', e); }
  loading.style.display = 'none';
  renderOutput(file, url, exifData, imgW, imgH, clipInfo);
}

function renderOutput(file, url, data, imgW, imgH, clipInfo) {
  const ext = file.name.split('.').pop().toUpperCase();
  const mime = file.type || 'unknown';
  let html = '';

  // 1. Preview
  const previewImg = imgW > 0
    ? `<img src="${url}" alt="Preview">`
    : `<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:32px;color:var(--text3)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <span style="font-size:12px;font-family:var(--mono)">Preview not available — ${ext} files cannot be rendered in this browser</span>
      </div>`;
  const dims = imgW > 0 ? `${imgW}×${imgH}px &nbsp;·&nbsp; ` : '';
  html += `<div class="img-preview">${previewImg}
    <div class="img-caption">${file.name} &nbsp;·&nbsp; ${fmtBytes(file.size)} &nbsp;·&nbsp; ${dims}${mime}</div>
  </div>`;

  // 2. File
  html += makeSection('File', [
    ['File Name', file.name], ['File Size', fmtBytes(file.size)],
    ['MIME Type', mime], ['File Type', ext],
    ['Image Size', `${imgW} × ${imgH}`],
    ['Last Modified', new Date(file.lastModified).toLocaleString('en-GB')]
  ]);

  // Build clipping path HTML now so it can be placed at position 4 in both branches
  const hasPaths = clipInfo && clipInfo.paths && clipInfo.paths.length > 0;
  const clipName = clipInfo && clipInfo.clipPathName;
  let clipHtml = `<div class="sec" id="sec-clip">
    <div class="sec-hdr" onclick="toggleSection('sec-clip')">
      <span class="sec-title">Clipping Path</span>
      ${hasPaths ? `<span class="bdg b-ok">${clipInfo.paths.length} path${clipInfo.paths.length>1?'s':''}</span>` : ''}
      <span class="sec-tog">▼</span>
    </div>
    <div class="sec-body">`;
  if (!hasPaths) {
    clipHtml += `<div class="box box-neutral">No clipping paths found in this image.</div>`;
  } else {
    clipHtml += clipName
      ? `<div class="box box-ok">Active clipping path: <span class="clip-active">"${clipName}"</span></div>`
      : `<div class="box box-ok">This image contains ${clipInfo.paths.length} clipping path${clipInfo.paths.length>1?' resources':' resource'}. No active path name set (resource 2999).</div>`;
    clipHtml += `<table class="meta-table">
      <tr><td>Path resources found</td><td>${clipInfo.paths.length}</td></tr>
      <tr><td>Active clip path name</td><td>${clipName ? `<span class="clip-name">"${clipName}"</span>` : '<em style="color:var(--text3)">Not set</em>'}</td></tr>`;
    for (const p of clipInfo.paths) {
      const subtypes = {};
      for (const r of p.records) subtypes[r.selector] = (subtypes[r.selector]||0) + 1;
      const detail = Object.entries(subtypes).map(([sel,cnt]) => `${cnt}× ${PATH_SELECTOR[sel]||'Record type '+sel}`).join(', ');
      const label = p.resourceName ? `"${p.resourceName}"` : '(unnamed)';
      clipHtml += `<tr><td>Path ${p.index} — ID ${p.id} (0x${p.id.toString(16).toUpperCase()})</td>
        <td><strong>${label}</strong><br><span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${detail}</span></td></tr>`;
    }
    clipHtml += '</table>';
  }
  clipHtml += `</div></div>`;

  if (!data) {
    // 3. Basic Image Information (no-data placeholder)
    html += `<div class="sec" id="sec-basic">
      <div class="sec-hdr" onclick="toggleSection('sec-basic')">
        <span class="sec-title">Basic Image Information</span><span class="sec-tog">▼</span>
      </div>
      <div class="sec-body"><p style="padding:14px;color:var(--text3);font-size:12px;text-align:center;font-style:italic">No EXIF or metadata found in this image.</p></div>
    </div>`;
    // 4. Clipping Path
    html += clipHtml;
    output.innerHTML = html; attachReload(); return;
  }

  const groups = data;
  const flat = {};
  for (const g of Object.values(groups)) { if (g && typeof g==='object' && !Array.isArray(g)) Object.assign(flat, g); }

  // Basic info
  const cam = flat.Make && flat.Model ? `${flat.Make} ${flat.Model}` : (flat.Model||flat.Make||null);
  const focalMM = flat.FocalLength ? (typeof flat.FocalLength==='number' ? flat.FocalLength.toFixed(1)+'mm' : flat.FocalLength) : null;
  const focal35 = flat.FocalLengthIn35mmFormat ? flat.FocalLengthIn35mmFormat+'mm (35mm equiv.)' : null;
  const lens = flat.LensModel||flat.LensInfo||flat.Lens||null;
  const lensStr = Array.isArray(lens) ? lens.filter(Boolean).join(' - ')+'mm' : lens;
  const shutter = flat.ExposureTime ? (flat.ExposureTime<1 ? `1/${Math.round(1/flat.ExposureTime)}` : flat.ExposureTime)+' sec' : null;
  const aperture = flat.FNumber ? `f/${flat.FNumber}` : (flat.ApertureValue ? `f/${Math.pow(2,flat.ApertureValue/2).toFixed(1)}` : null);
  const iso = flat.ISO||flat.ISOSpeedRatings;
  const ev = flat.ExposureCompensation;
  const basicRows = [];
  if (cam) basicRows.push(['Camera', cam]);
  if (lensStr) basicRows.push(['Lens', lensStr]);
  if (focalMM) basicRows.push(['Focal Length', focal35 ? `${focalMM} (${focal35})` : focalMM]);
  if (shutter||aperture||iso||ev!==undefined) basicRows.push(['Exposure', [shutter,aperture,iso?'ISO '+iso:null,ev!=null&&ev!==0?'EV '+ev:null].filter(Boolean).join(' · ')]);
  if (flat.ExposureProgram) basicRows.push(['Exposure Program', flat.ExposureProgram]);
  if (flat.Flash !== undefined) basicRows.push(['Flash', String(flat.Flash)]);
  if (flat.FocusMode||flat.AFAreaMode) basicRows.push(['Focus Mode', flat.FocusMode||flat.AFAreaMode]);
  if (flat.WhiteBalance) basicRows.push(['White Balance', flat.WhiteBalance]);
  if (flat.MeteringMode) basicRows.push(['Metering Mode', flat.MeteringMode]);
  const dateTaken = flat.DateTimeOriginal||flat.CreateDate||flat.DateTime;
  if (dateTaken) basicRows.push(['Date/Time', `<strong>${fmtDate(dateTaken)}</strong>`]);
  basicRows.push(['File', `<strong>${imgW}×${imgH}</strong> ${ext} &nbsp; ${fmtBytes(file.size)}`]);
  if (flat.ColorSpace) basicRows.push(['Color Space', flat.ColorSpace]);
  if (flat.Software) basicRows.push(['Software', flat.Software]);
  if (flat.Artist) basicRows.push(['Artist', flat.Artist]);
  if (flat.Copyright) basicRows.push(['Copyright', flat.Copyright]);

  const warnings = flat.ColorSpace==='sRGB' && !flat.ICC
    ? `<div class="box box-warn">⚠ Color space tagged as sRGB but no embedded ICC color profile found.</div>` : '';

  // 3. Basic Image Information
  html += `<div class="sec" id="sec-basic">
    <div class="sec-hdr" onclick="toggleSection('sec-basic')">
      <span class="sec-title">Basic Image Information</span><span class="sec-tog">▼</span>
    </div>
    <div class="sec-body">${warnings}<table class="meta-table">${basicRows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table></div>
  </div>`;

  // 4. Clipping Path
  html += clipHtml;

  // GPS
  const gps = groups.gps||{};
  if (gps.latitude!==undefined || gps.longitude!==undefined) {
    const lat = gps.latitude??flat.GPSLatitude, lon = gps.longitude??flat.GPSLongitude, alt = gps.altitude??flat.GPSAltitude;
    const latRef = flat.GPSLatitudeRef||(lat>=0?'N':'S'), lonRef = flat.GPSLongitudeRef||(lon>=0?'E':'W');
    const gpsRows = [];
    if (lat!=null) gpsRows.push(['Latitude', `${lat.toFixed(6)}° &nbsp; <span style="color:var(--text3)">${dms(lat,latRef)}</span>`]);
    if (lon!=null) gpsRows.push(['Longitude', `${lon.toFixed(6)}° &nbsp; <span style="color:var(--text3)">${dms(lon,lonRef)}</span>`]);
    if (alt!=null) gpsRows.push(['Altitude', `${typeof alt==='number' ? alt.toFixed(1) : alt} m`]);
    if (flat.GPSSpeed) gpsRows.push(['Speed', flat.GPSSpeed]);
    if (flat.GPSImgDirection) gpsRows.push(['Direction', flat.GPSImgDirection+'°']);
    if (lat!=null && lon!=null) gpsRows.push(['Map', `<a class="map-link" href="https://maps.google.com/?q=${lat},${lon}" target="_blank">Google Maps ↗</a> &nbsp; <a class="map-link" href="https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=15" target="_blank">OpenStreetMap ↗</a>`]);
    html += makeSection('GPS / Location', gpsRows);
  }

  // EXIF
  const exifGroup = groups.exif||groups.Exif||{};
  const exifRows = Object.entries(exifGroup).filter(([k]) => !['MakerNote','UserComment'].includes(k)).map(([k,v]) => [k,v]);
  if (exifRows.length) html += makeSection('EXIF', exifRows);

  // TIFF
  const tiffGroup = groups.tiff||groups.ifd0||{};
  const tiffRows = Object.entries(tiffGroup).map(([k,v]) => [k,v]);
  if (tiffRows.length) html += makeSection('TIFF / IFD0', tiffRows);

  // IPTC
  const iptcGroup = groups.iptc||groups.IPTC||{};
  const iptcRows = Object.entries(iptcGroup).map(([k,v]) => [k,v]);
  if (iptcRows.length) html += makeSection('IPTC', iptcRows);

  // XMP
  const xmpGroup = groups.xmp||groups.XMP||{};
  const xmpRows = Object.entries(xmpGroup).map(([k,v]) => [k,v]);
  if (xmpRows.length) html += makeSection('XMP', xmpRows);

  // MakerNotes
  const makerKeys = Object.keys(flat).filter(k => k.toLowerCase().includes('maker') || /^(Canon|Nikon|Sony|Fuji|Olympus|Panasonic|Apple|Samsung|Leica|Pentax)/.test(k));
  if (makerKeys.length) html += makeSection('MakerNotes', makerKeys.map(k => [k, flat[k]]));

  // ICC
  const iccGroup = groups.icc||groups.ICC||{};
  const iccRows = Object.entries(iccGroup).map(([k,v]) => [k,v]);
  if (iccRows.length) html += makeSection('ICC Color Profile', iccRows);

  // Remaining
  const knownKeys = new Set([...Object.keys(exifGroup),...Object.keys(tiffGroup),...Object.keys(iptcGroup),...Object.keys(xmpGroup),...Object.keys(iccGroup),...Object.keys(gps),...makerKeys,'latitude','longitude','altitude']);
  const remainRows = Object.entries(flat).filter(([k]) => !knownKeys.has(k)).map(([k,v]) => [k,v]);
  if (remainRows.length) html += makeSection('Other / Composite', remainRows);

  output.innerHTML = html;
  attachReload();
}

function attachReload() {
  dropZone.style.display = '';
  dropZone.className = 'drop-small';
  dropZone.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3);flex-shrink:0"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    <span>Load another image</span>`;
  dropZone.onclick = () => { fileInput.value = ''; fileInput.click(); };
}
</script>
</body>
</html>
