<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Schema Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2318181b'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='monospace' font-size='16' font-weight='700' fill='%2338bdf8'>{}</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--bg2:#12151e;--bg3:#181c28;--bg4:#1f2436;--bg5:#252b40;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#dde1f0;--text2:#7c829a;--text3:#454b62;
  --accent:#4f7ef5;--accent2:#3662d8;
  --green:#3dd68c;--amber:#f5a623;--coral:#f0645a;--teal:#22d3c8;--purple:#9b7ff4;--pink:#e879a8;
  --shadow:rgba(0,0,0,0.5);
  --mono:'JetBrains Mono','Fira Code',monospace;--sans:'Outfit',system-ui,sans-serif;
}
html.light{
  --bg:#f0f2f7;--bg2:#ffffff;--bg3:#e8eaf2;--bg4:#dde0ec;--bg5:#cdd1e0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.2);
  --text:#1a1d2e;--text2:#4a5068;--text3:#8890aa;
  --shadow:rgba(0,0,0,0.15);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
.theme-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;font-size:15px;line-height:1}
.sb-path{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;margin-bottom:14px;word-break:break-all;line-height:1.7;display:flex;flex-wrap:wrap;align-items:baseline;gap:0}
.sb-path .pcrumb{color:var(--text2)}.sb-path .pcrumb-sep{color:var(--text3);margin:0 2px}
.sb-path .pcrumb:last-child{color:var(--accent)}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;position:relative;z-index:100}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.04em;white-space:nowrap}
.logo em{color:var(--text3);font-style:normal}
.divider{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.srch{flex:1;max-width:380px;position:relative}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.srch input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 12px 7px 32px;outline:none;transition:border-color .15s}
.srch input:focus{border-color:var(--accent)}
.srch input::placeholder{color:var(--text3)}
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.pill{font-family:var(--mono);font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
button{cursor:pointer;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);color:var(--text2);font-family:var(--sans);font-size:12px;padding:6px 12px;transition:background .15s,transform .1s;white-space:nowrap}
button:hover{background:var(--bg4);color:var(--text)}
button:active{transform:scale(0.96)}
.btn-p{background:rgba(79,126,245,.15);border-color:rgba(79,126,245,.3);color:var(--accent);font-weight:500}
.btn-p:hover{background:rgba(79,126,245,.25);color:var(--accent)}
.body{display:flex;flex:1;overflow:hidden}
.tree-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.toolbar button{padding:4px 10px;font-size:11px}
.stats{font-size:11px;color:var(--text3);font-family:var(--mono);flex:1}
.match-nav{display:flex;align-items:center;gap:4px}
.match-nav span{font-size:11px;color:var(--text2);font-family:var(--mono)}
.match-nav button{padding:3px 8px;font-size:11px}
.tree{flex:1;overflow-y:auto;padding:6px 0 24px;scrollbar-width:thin;scrollbar-color:var(--bg5) transparent}
.tree::-webkit-scrollbar{width:5px}
.tree::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
.drop{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3);padding:40px;text-align:center}
.drop-ring{width:72px;height:72px;border:2px dashed var(--border3);border-radius:18px;display:flex;align-items:center;justify-content:center}
.drop h2{font-size:17px;font-weight:500;color:var(--text2)}
.drop p{font-size:12px;line-height:1.7;max-width:270px}
.node-row{display:flex;align-items:center;padding:2px 10px 2px 0;margin:0 6px 1px;border-radius:6px;cursor:pointer;min-height:27px;border:1px solid transparent;transition:background .08s}
.node-row:hover{background:var(--bg3)}
.node-row.sel{background:rgba(79,126,245,.14);border-color:rgba(79,126,245,.22)}
.node-row.sel .nname{color:var(--accent)}
.node-row.hit-cur{background:rgba(245,166,35,.13);border-color:rgba(245,166,35,.3)}
.node-row.hit-cur .nname{color:var(--amber)}
.node-row.hit-other{background:rgba(245,166,35,.05);opacity:.6}
.node-row.hit-other .nname{color:var(--amber)}
.tog{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);font-size:8px;transition:transform .15s}
.tog.open{transform:rotate(90deg)}
.tog.leaf{opacity:0;pointer-events:none}
.nicon{width:15px;height:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:7px}
.nname{font-family:var(--mono);font-size:12.5px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nbadges{display:flex;align-items:center;gap:3px;margin-left:6px;flex-shrink:0}
.bdg{font-size:10px;font-weight:600;font-family:var(--mono);padding:1px 5px;border-radius:4px}
.b-str{background:rgba(61,214,140,.12);color:var(--green)}
.b-num{background:rgba(245,166,35,.12);color:var(--amber)}
.b-bool{background:rgba(155,127,244,.12);color:var(--purple)}
.b-arr{background:rgba(34,211,200,.12);color:var(--teal)}
.b-obj{background:rgba(79,126,245,.1);color:var(--accent)}
.b-req{background:rgba(240,100,90,.12);color:var(--coral)}
.b-ref{background:rgba(245,166,35,.1);color:var(--amber);font-size:9px}
.b-enum{background:rgba(232,121,168,.11);color:var(--pink)}
.b-mult{background:var(--bg4);border:1px solid var(--border2);color:var(--text3)}
.sidebar{width:300px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s ease}
.sidebar.closed{width:0;border-left:none}
.sb-hdr{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3)}
.sb-hdr button{margin-left:auto;background:none;border:none;padding:0;font-size:18px;color:var(--text3);line-height:1}
.sb-hdr button:hover{color:var(--text);transform:none}
.sb-body{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--bg5) transparent}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.empty-sb{height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;text-align:center;padding:20px}
.s-sec{margin-bottom:18px}
.s-lbl{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:9px}
.s-row{display:flex;gap:8px;font-size:11px;margin-bottom:6px;align-items:flex-start}
.s-key{color:var(--text3);min-width:74px;flex-shrink:0;padding-top:1px}
.s-val{color:var(--text);word-break:break-all;font-family:var(--mono)}
.desc{font-size:12px;line-height:1.65;color:var(--text2);background:var(--bg3);border-left:2px solid var(--accent);padding:8px 10px;border-radius:0 6px 6px 0;margin-bottom:16px}
.snippet{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:11px;font-family:var(--mono);font-size:11px;line-height:1.75;white-space:pre-wrap;word-break:break-word;max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg5) transparent}
.jk{color:#6faef7}.js{color:var(--green)}.jn{color:var(--amber)}.jb{color:var(--purple)}.jl{color:var(--coral)}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;font-family:var(--mono);background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;color:var(--text2)}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">json<em>/</em>explorer</div>
    <div class="divider"></div>
    <div class="srch">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="si" type="text" placeholder="Search properties, types, descriptions…">
    </div>
    <div class="hdr-r">
      <button class="theme-btn" id="themebtn" title="Toggle light/dark mode">🌙</button>
      <button id="tsbtn">⊟ Properties</button>
      <button id="clrcbtn" style="display:none" onclick="clearJsonCache()">✕ Clear cache</button>
      <button class="btn-p" onclick="document.getElementById('fi').click()">↑ Load Schema</button>
      <input type="file" id="fi" accept=".json">
    </div>
  </div>
  <div class="body">
    <div class="tree-wrap">
      <div class="drop" id="dz">
        <div class="drop-ring">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <h2>No schema loaded</h2>
        <p>Upload a JSON Schema file to explore its structure with full $ref resolution. Drag and drop supported.</p>
        <button class="btn-p" onclick="document.getElementById('fi').click()">Choose JSON schema file</button>
      </div>
      <div id="tw" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="toolbar">
          <button onclick="expandAll()">Expand all</button>
          <button onclick="collapseAll()">Collapse all</button>
          <span class="stats" id="st"></span>
          <div class="match-nav" id="mnav" style="display:none">
            <button onclick="prevMatch()">&#8593;</button>
            <span id="mstat"></span>
            <button onclick="nextMatch()">&#8595;</button>
          </div>
          <span class="pill" id="pill" style="display:none"></span>
        </div>
        <div class="tree" id="tr"></div>
      </div>
    </div>
    <div class="sidebar" id="sb">
      <div class="sb-hdr">
        <span class="sb-title">Node properties</span>
        <button onclick="closeSb()">×</button>
      </div>
      <div class="sb-body" id="sbb">
        <div class="empty-sb">Click any node in the tree to inspect its schema</div>
      </div>
    </div>
  </div>
</div>
<script>
let root=null,expanded=new Set,selected=null,query='',sbOpen=localStorage.getItem('sb-open')!=='false';
let matches=[],matchIdx=0;
const MAX_DEPTH=30;

const fi=document.getElementById('fi'),si=document.getElementById('si'),dz=document.getElementById('dz'),tw=document.getElementById('tw'),tr=document.getElementById('tr'),sb=document.getElementById('sb'),sbb=document.getElementById('sbb'),pill=document.getElementById('pill'),st=document.getElementById('st'),mnav=document.getElementById('mnav'),mstat=document.getElementById('mstat');
sb.classList.toggle('closed',!sbOpen);

fi.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const txt=ev.target.result;load(JSON.parse(txt),f.name);saveJsonCache(f.name,txt);document.getElementById('clrcbtn').style.display='';}catch(e){alert('Invalid JSON: '+e.message)}};r.readAsText(f);fi.value='';};
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.json')){const r=new FileReader();r.onload=ev=>{try{const txt=ev.target.result;load(JSON.parse(txt),f.name);saveJsonCache(f.name,txt);document.getElementById('clrcbtn').style.display='';}catch(e){alert('Invalid JSON')}};r.readAsText(f);}});

si.oninput=()=>{query=si.value.toLowerCase().trim();if(query)runSearch();else{matches=[];matchIdx=0;mnav.style.display='none';render();}};
document.getElementById('tsbtn').onclick=()=>{sbOpen=!sbOpen;sb.classList.toggle('closed',!sbOpen);localStorage.setItem('sb-open',sbOpen?'true':'false');};
function closeSb(){sbOpen=false;sb.classList.add('closed');localStorage.setItem('sb-open','false');}

function load(schema,name){root=schema;expanded=new Set(['__r__']);selected=null;query='';matches=[];matchIdx=0;si.value='';mnav.style.display='none';pill.textContent=name;pill.style.display='';dz.style.display='none';tw.style.display='flex';render();}

function resolveRef(ref,visitedRefs){
  if(!ref||!ref.startsWith('#/'))return null;
  if(visitedRefs.has(ref))return null;
  const parts=ref.slice(2).split('/').map(p=>p.replace(/~1/g,'/').replace(/~0/g,'~'));
  let c=root;
  for(const p of parts){if(!c||typeof c!=='object')return null;c=c[p];}
  return c||null;
}

function effective(s,visitedRefs){
  if(!s||typeof s!=='object')return s;
  if(!s.$ref)return s;
  if(visitedRefs.has(s.$ref))return{_circ:true,_ref:s.$ref};
  const resolved=resolveRef(s.$ref,visitedRefs);
  if(!resolved)return{_circ:true,_ref:s.$ref};
  const v2=new Set(visitedRefs);v2.add(s.$ref);
  return{...resolved,_refFrom:s.$ref,_visitedRefs:v2};
}

function gtype(s){
  if(!s)return null;
  if(s._circ)return'circular';
  if(s.type)return Array.isArray(s.type)?s.type.join('|'):s.type;
  if(s.properties||s.additionalProperties)return'object';
  if(s.items)return'array';
  if(s.allOf)return'allOf';
  if(s.anyOf)return'anyOf';
  if(s.oneOf)return'oneOf';
  if(s.enum)return'enum';
  return null;
}

function gkids(s,isRoot,visitedRefs){
  visitedRefs=visitedRefs||new Set(s._visitedRefs||[]);
  if(!s||typeof s!=='object'||s._circ)return[];
  const out=[],req=new Set(s.required||[]);
  function child(key,raw,kind){const eff=raw.$ref?effective(raw,visitedRefs):raw;out.push({key,schema:eff,req:req.has(key),kind});}
  if(s.properties)for(const[k,v]of Object.entries(s.properties))child(k,v,'prop');
  // For arrays, transparently step into items and show its children directly
  if(s.items){
    const itemsEff=s.items.$ref?effective(s.items,visitedRefs):s.items;
    if(itemsEff.properties){
      const itemReq=new Set(itemsEff.required||[]);
      for(const[k,v]of Object.entries(itemsEff.properties)){
        const eff=v.$ref?effective(v,visitedRefs):v;
        out.push({key:k,schema:eff,req:itemReq.has(k),kind:'prop'});
      }
    } else if(itemsEff.type||itemsEff.$ref){
      // Primitive or ref items — show a single representative child
      child('[items]',s.items,'items');
    }
  }
  if(s.allOf)s.allOf.forEach((v,i)=>child(`allOf[${i}]`,v,'comp'));
  if(s.anyOf)s.anyOf.forEach((v,i)=>child(`anyOf[${i}]`,v,'comp'));
  if(s.oneOf)s.oneOf.forEach((v,i)=>child(`oneOf[${i}]`,v,'comp'));
  if(!isRoot){
    if(s.definitions)for(const[k,v]of Object.entries(s.definitions))out.push({key:k,schema:v,req:false,kind:'def'});
    if(s.$defs)for(const[k,v]of Object.entries(s.$defs))out.push({key:k,schema:v,req:false,kind:'def'});
  }
  return out;
}

function nodeMatches(key,s){
  if(!query)return false;
  if(key.toLowerCase().includes(query))return true;
  if((gtype(s)||'').toLowerCase().includes(query))return true;
  if((s.description||'').toLowerCase().includes(query))return true;
  if((s.title||'').toLowerCase().includes(query))return true;
  return false;
}

function runSearch(){
  matches=[];
  const stack=[{schema:root,path:'__r__',isRoot:true,depth:0,visitedRefs:new Set()}];
  while(stack.length){
    const{schema:s,path,isRoot,depth,visitedRefs}=stack.pop();
    if(!s||depth>MAX_DEPTH)continue;
    const kids=gkids(s,isRoot,visitedRefs);
    for(const c of kids){
      const p=path+'/'+c.key;
      if(nodeMatches(c.key,c.schema))matches.push(p);
      stack.push({schema:c.schema,path:p,isRoot:false,depth:depth+1,visitedRefs:new Set(c.schema._visitedRefs||visitedRefs)});
    }
  }
  matchIdx=0;
  if(matches.length){expandToPath(matches[0]);selected=matches[0];}
  render();updateMatchNav();
  if(matches.length){showSb(matches[0]);scrollToPath(matches[0]);}
}

function expandToPath(path){const parts=path.split('/');for(let i=1;i<=parts.length;i++)expanded.add(parts.slice(0,i).join('/'));}
function updateMatchNav(){if(!query||!matches.length){mnav.style.display='none';return;}mnav.style.display='flex';mstat.textContent=`${matchIdx+1} / ${matches.length}`;}
function nextMatch(){if(!matches.length)return;matchIdx=(matchIdx+1)%matches.length;selected=matches[matchIdx];expandToPath(matches[matchIdx]);render();updateMatchNav();showSb(matches[matchIdx]);scrollToPath(matches[matchIdx]);}
function prevMatch(){if(!matches.length)return;matchIdx=(matchIdx-1+matches.length)%matches.length;selected=matches[matchIdx];expandToPath(matches[matchIdx]);render();updateMatchNav();showSb(matches[matchIdx]);scrollToPath(matches[matchIdx]);}
function scrollToPath(path){setTimeout(()=>{const el=tr.querySelector(`[data-path="${CSS.escape(path)}"]`);if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});},50);}

let nc=0,rc=0;
function render(){
  if(!root)return;nc=0;rc=0;
  const matchSet=new Set(matches);
  tr.innerHTML=buildNode('__r__',root.title||'root',root,false,'root',0,true,matchSet,new Set());
  st.textContent=`${nc} nodes · ${rc} $refs`;
  tr.querySelectorAll('[data-path]').forEach(el=>el.addEventListener('click',function(e){e.stopPropagation();onClick(this.dataset.path);}));
}

function buildNode(path,key,schema,req,kind,depth,isRoot,matchSet,visitedRefs){
  if(depth>MAX_DEPTH)return'';
  nc++;if(schema&&schema._refFrom)rc++;
  const kids=gkids(schema,isRoot,visitedRefs);
  const isExp=expanded.has(path),isSel=selected===path;
  const isMatchCur=matchSet.has(path)&&matches[matchIdx]===path;
  const isMatchOther=matchSet.has(path)&&!isMatchCur;
  const type=gtype(schema),indent=depth*16+6;
  let cls='node-row';
  if(isSel&&!isMatchCur&&!isMatchOther)cls+=' sel';
  if(isMatchCur)cls+=' hit-cur';
  else if(isMatchOther)cls+=' hit-other';
  const togCls=kids.length?(isExp?'tog open':'tog'):'tog leaf';
  const dkey=kind==='items'?'[ ]':kind==='def'?'◆ '+key:key;
  let bdg='';
  if(type){const bc={string:'b-str',number:'b-num',integer:'b-num',boolean:'b-bool',array:'b-arr',object:'b-obj',allOf:'b-arr',anyOf:'b-arr',oneOf:'b-arr',enum:'b-enum',circular:'b-req'}[type]||'b-obj';bdg+=`<span class="bdg ${bc}">${esc(type)}</span>`;}
  if(type==='array'||schema.items){let m='[*]';if(schema.minItems!==undefined||schema.maxItems!==undefined)m=`[${schema.minItems??0}..${schema.maxItems??'∞'}]`;bdg+=`<span class="bdg b-mult">${m}</span>`;}
  if(req)bdg+=`<span class="bdg b-req">req</span>`;
  if(schema._refFrom)bdg+=`<span class="bdg b-ref">$ref</span>`;
  if(schema.enum)bdg+=`<span class="bdg b-enum">enum</span>`;
  if(schema._circ)bdg+=`<span class="bdg b-req">∞ circ</span>`;
  let ch='';
  if(kids.length&&isExp){
    ch='<div>';
    const childVisited=new Set(schema._visitedRefs||visitedRefs);
    for(const c of kids)ch+=buildNode(path+'/'+c.key,c.key,c.schema,c.req,c.kind,depth+1,false,matchSet,new Set(c.schema._visitedRefs||childVisited));
    ch+='</div>';
  }
  return`<div class="node"><div class="${cls}" style="padding-left:${indent}px" data-path="${esc(path)}"><div class="${togCls}">▶</div><div class="nicon">${icon(type,kind)}</div><div class="nname">${esc(dkey)}</div><div class="nbadges">${bdg}</div></div>${ch}</div>`;
}

function onClick(path){
  if(expanded.has(path))expanded.delete(path);else expanded.add(path);
  selected=path;
  if(query&&matches.includes(path)){matchIdx=matches.indexOf(path);updateMatchNav();}
  render();showSb(path);
}

function findAt(path){
  if(path==='__r__')return root;
  const parts=path.split('/').slice(1);
  let s=root,visitedRefs=new Set();
  for(const p of parts){
    if(!s)return null;
    const kids=gkids(s,s===root,visitedRefs);
    const c=kids.find(x=>x.key===p);
    if(!c)return null;
    visitedRefs=new Set(c.schema._visitedRefs||visitedRefs);
    s=c.schema;
  }
  return s;
}

function isReq(path){
  const parts=path.split('/');if(parts.length<2)return false;
  const key=parts[parts.length-1],pp=parts.slice(0,-1).join('/'),ps=findAt(pp);
  return ps&&Array.isArray(ps.required)&&ps.required.includes(key);
}

function showSb(path){
  const s=findAt(path);
  if(!s){sbb.innerHTML='<div class="empty-sb">Could not resolve node</div>';return;}
  const key=path==='__r__'?(root.title||'root'):path.split('/').pop();
  const type=gtype(s);const kids=gkids(s,path==='__r__',new Set(s._visitedRefs||[]));
  let h='';
  // Path — JSONPath format
  const jpParts = path==='__r__' ? [] : path.split('/').slice(1);
  const buildJsonPath = (parts) => {
    let jp = '$';
    let cur = root;
    for (const p of parts) {
      const kids = gkids(cur, cur===root, new Set(cur._visitedRefs||[]));
      const child = kids.find(c => c.key===p);
      if (child) {
        const ctype = gtype(child.schema);
        jp += '.' + p;
        // If the parent schema is an array, this child lives inside [*]
        if (cur.type==='array' || cur.items) jp = jp; // already stepped in transparently
        if (ctype==='array') jp += '[*]';
        cur = child.schema;
      } else {
        jp += '.' + p;
      }
    }
    return jp;
  };
  const jsonpath = buildJsonPath(jpParts);
  // Split into display tokens on . and [*]
  const tokens = jsonpath.split(/(\.\w+|\[\*\])/).filter(Boolean);
  h+=`<div class="sb-path" title="${esc(jsonpath)}" data-copy="${esc(jsonpath)}">`;
  tokens.forEach((tok, i) => {
    const isLast = i === tokens.length - 1;
    if (tok === '[*]') {
      h += `<span class="pcrumb-sep">[*]</span>`;
    } else if (tok.startsWith('.')) {
      h += `<span class="pcrumb-sep">.</span><span class="pcrumb${isLast?' last':''}">${esc(tok.slice(1))}</span>`;
    } else {
      h += `<span class="pcrumb" style="color:var(--accent)">${esc(tok)}</span>`;
    }
  });
  h+=`<span class="copy-path-btn" title="Copy JSONPath" style="margin-left:auto;cursor:pointer;color:var(--text3);font-size:10px;flex-shrink:0;padding-left:8px">⎘</span>`;
  h+=`</div>`;
  if(s.description)h+=`<div class="desc">${esc(s.description)}</div>`;
  h+=`<div class="s-sec"><div class="s-lbl">Schema info</div>`;
  h+=row('name',`<span style="color:var(--accent)">${esc(key)}</span>`);
  if(type)h+=row('type',`<span>${esc(type)}</span>`);
  if(s.format)h+=row('format',`<span style="color:var(--green)">${esc(s.format)}</span>`);
  if(isReq(path))h+=row('required',`<span style="color:var(--coral)">true</span>`);
  if(s._refFrom)h+=row('$ref',`<span style="color:var(--amber);font-size:10px">${esc(s._refFrom)}</span>`);
  if(s.default!==undefined)h+=row('default',esc(JSON.stringify(s.default)));
  if(s.example!==undefined)h+=row('example',esc(JSON.stringify(s.example)));
  h+='</div>';
  const cons=[];
  ['minimum','maximum','minLength','maxLength','minItems','maxItems','pattern','multipleOf'].forEach(k=>{if(s[k]!==undefined)cons.push([k,s[k]]);});
  if(s.uniqueItems)cons.push(['uniqueItems','true']);
  if(cons.length){h+=`<div class="s-sec"><div class="s-lbl">Constraints</div>`;for(const[k,v]of cons)h+=row(k,`<span style="color:var(--amber)">${esc(String(v))}</span>`);h+='</div>';}
  if(s.enum){h+=`<div class="s-sec"><div class="s-lbl">Enum values</div><div class="tags">`;s.enum.forEach(v=>{h+=`<span class="tag">${esc(JSON.stringify(v))}</span>`;});h+='</div></div>';}
  if(kids.length){h+=`<div class="s-sec"><div class="s-lbl">Children</div>`;h+=row('count',String(kids.length));const rl=s.required||[];if(rl.length)h+=row('required',`<div class="tags" style="margin-top:3px">${rl.map(r=>`<span class="tag" style="color:var(--coral)">${esc(r)}</span>`).join('')}</div>`);h+='</div>';}
  const snip={...s};['_refFrom','_circ','_visitedRefs','_vis'].forEach(k=>delete snip[k]);
  if(snip.properties&&Object.keys(snip.properties).length>5){const ks=Object.keys(snip.properties),t={};ks.slice(0,4).forEach(k=>t[k]=snip.properties[k]);t['…']=`(${ks.length-4} more)`;snip.properties=t;}
  h+=`<div class="s-sec"><div class="s-lbl">Schema snippet</div><div class="snippet">${hljs(JSON.stringify(snip,null,2))}</div></div>`;
  sbb.innerHTML=h;
}

function row(k,v){return`<div class="s-row"><span class="s-key">${esc(k)}</span><span class="s-val">${v}</span></div>`;}

// Copy path button — event delegation so it works after innerHTML replacement
sbb.addEventListener('click', e => {
  const btn = e.target.closest('.copy-path-btn');
  if (!btn) return;
  const text = btn.closest('.sb-path')?.dataset.copy || '';
  if (text) navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = orig, 1200);
  });
});
sbb.addEventListener('mouseover', e => { if(e.target.classList.contains('copy-path-btn')) e.target.style.color='var(--accent)'; });
sbb.addEventListener('mouseout',  e => { if(e.target.classList.contains('copy-path-btn')) e.target.style.color='var(--text3)'; });
function hljs(s){return esc(s).replace(/&quot;([^&]+)&quot;\s*:/g,'<span class="jk">"$1"</span>:').replace(/:\s*&quot;([^&]*)&quot;/g,': <span class="js">"$1"</span>').replace(/:\s*(-?\d+\.?\d*)/g,': <span class="jn">$1</span>').replace(/:\s*(true|false)/g,': <span class="jb">$1</span>').replace(/:\s*(null)/g,': <span class="jl">$1</span>');}

function icon(type,kind){
  const c={string:'var(--green)',number:'var(--amber)',integer:'var(--amber)',boolean:'var(--purple)',null:'var(--coral)',array:'var(--teal)',object:'var(--accent)',allOf:'var(--pink)',anyOf:'var(--pink)',oneOf:'var(--teal)'}[type]||'var(--text3)';
  if(kind==='def')return`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`;
  if(kind==='items')return`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`;
  if(kind==='comp')return`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`;
  const paths={string:'M4 7V4h16v3M9 20h6M12 4v16',number:'M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6',integer:'M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6',boolean:'M20 6L9 17l-5-5',array:'M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01',object:'M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z'};
  const d=paths[type]||'M12 12m-3 0a3 3 0 1 0 6 0 3 3 0 1 0-6 0';
  return`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><path d="${d}"/></svg>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function expandAll(){
  const stack=[{schema:root,path:'__r__',isRoot:true,depth:0,visitedRefs:new Set()}];
  while(stack.length){
    const{schema:s,path,isRoot,depth,visitedRefs}=stack.pop();
    if(!s||depth>MAX_DEPTH)continue;
    expanded.add(path);
    const kids=gkids(s,isRoot,visitedRefs);
    for(const c of kids)stack.push({schema:c.schema,path:path+'/'+c.key,isRoot:false,depth:depth+1,visitedRefs:new Set(c.schema._visitedRefs||visitedRefs)});
  }
  render();
}
function collapseAll(){expanded=new Set(['__r__']);render();}

// ── File Cache (IndexedDB) ───────────────────────────────────────────────────
function openCacheDB(db,store){return new Promise((res,rej)=>{const r=indexedDB.open(db,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(store,{keyPath:'name'});r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);});}
function saveJsonCache(filename,text){openCacheDB('json-explorer-v1','schema').then(db=>{const tx=db.transaction('schema','readwrite');tx.objectStore('schema').put({name:'__last__',filename,text});}).catch(()=>{});}
function clearJsonCache(){openCacheDB('json-explorer-v1','schema').then(db=>{const tx=db.transaction('schema','readwrite');tx.objectStore('schema').clear();}).catch(()=>{});document.getElementById('clrcbtn').style.display='none';}
(async function(){try{const db=await openCacheDB('json-explorer-v1','schema');const cached=await new Promise(res=>{const tx=db.transaction('schema','readonly');const req=tx.objectStore('schema').get('__last__');req.onsuccess=e=>res(e.target.result||null);req.onerror=()=>res(null);});if(cached){load(JSON.parse(cached.text),cached.filename);document.getElementById('clrcbtn').style.display='';}}catch(e){}})();

// ── Theme Toggle ─────────────────────────────────────────────────────────────
(function(){
  const btn=document.getElementById('themebtn');
  const apply=light=>{document.documentElement.classList.toggle('light',light);btn.textContent=light?'🌙':'☀️';};
  apply(localStorage.getItem('schema-explorer-theme')==='light');
  btn.addEventListener('click',()=>{
    const isLight=document.documentElement.classList.toggle('light');
    btn.textContent=isLight?'🌙':'☀️';
    localStorage.setItem('schema-explorer-theme',isLight?'light':'dark');
  });
})();
</script>
